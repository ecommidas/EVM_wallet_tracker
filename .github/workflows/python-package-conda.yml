name: EVM Wallet Tracker

on:
  schedule:
    - cron: '*/5 * * * *'   # chạy mỗi 5 phút
  workflow_dispatch:          # cho phép chạy thủ công từ GitHub UI

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # cần để commit seen_txs.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install httpx

      - name: Run tracker
        env:
          WALLETS_JSON:        ${{ secrets.WALLETS_JSON }}
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          ETHERSCAN_API_KEY:   ${{ secrets.ETHERSCAN_API_KEY }}
          BSCSCAN_API_KEY:     ${{ secrets.BSCSCAN_API_KEY }}
          POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}
          ARBISCAN_API_KEY:    ${{ secrets.ARBISCAN_API_KEY }}
          OPTIMISM_API_KEY:    ${{ secrets.OPTIMISM_API_KEY }}
          BASESCAN_API_KEY:    ${{ secrets.BASESCAN_API_KEY }}
          SNOWTRACE_API_KEY:   ${{ secrets.SNOWTRACE_API_KEY }}
        run: python tracker.py

      - name: Save state (seen_txs.json)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_txs.json
          git diff --cached --quiet || git commit -m "chore: update seen_txs [skip ci]"
          git push
